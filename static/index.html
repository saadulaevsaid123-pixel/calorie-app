<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalorei</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #111318;
  --bg2: #1C1F26;
  --bg3: #252830;
  --green: #3DDC84;
  --text: #FFFFFF;
  --text2: #9BA3AF;
  --text3: #555B66;
  --border: #2A2D35;
  --yellow: #F5C518;
  --blue: #4A9EFF;
  --red: #FF4D6D;
  --orange: #FF8C00;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 9px 4px 7px; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 600; gap: 4px; cursor: pointer; font-family: inherit; }
.nav-btn.active { color: var(--green); }
.nav-btn svg { width: 24px; height: 24px; stroke-width: 1.8; }

/* PAGES */
.page { display: none; padding-bottom: 80px; min-height: 100vh; opacity: 0; }
.page.active { display: block; animation: page-in .25s ease forwards; }
@keyframes page-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.page.active { display: block; }

/* DIARY HEADER */
.diary-topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
.diary-topbar-left h2 { font-size: 20px; font-weight: 800; }
.diary-topbar-left p { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* FIRE BUTTON */
.fire-btn { position: relative; background: none; border: none; cursor: pointer; padding: 4px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.fire-svg { width: 36px; height: 36px; transition: filter .3s; }
.fire-svg.active { filter: drop-shadow(0 0 6px #ff6b00) drop-shadow(0 0 3px #ff8c00); animation: flicker 1.8s ease-in-out infinite; }
.fire-svg.inactive { filter: grayscale(1) opacity(.35); }
@keyframes flicker {
  0%,100% { transform: scale(1) rotate(-2deg); }
  20% { transform: scale(1.06) rotate(2deg); }
  40% { transform: scale(0.96) rotate(-1deg); }
  60% { transform: scale(1.04) rotate(1.5deg); }
  80% { transform: scale(0.98) rotate(-0.5deg); }
}
@keyframes coil-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes coil-out {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); }
}
@keyframes ring-in {
  from { opacity: 0; transform: rotate(-90deg) scale(0.9); }
  to { opacity: 1; transform: rotate(-90deg) scale(1); }
}
.fire-badge { position: absolute; top: -2px; right: -4px; background: var(--green); color: #000; font-size: 10px; font-weight: 800; border-radius: 10px; padding: 1px 5px; display: none; }

/* WEEK STRIP */
.week-strip { display: flex; padding: 0 10px 14px; gap: 2px; }
.week-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.week-day-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
.week-day-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--text2); }
.week-day-num.today { background: var(--green); color: #000; font-weight: 800; }

/* MACRO STRIP */
.macro-strip { background: var(--bg2); margin: 0 12px 14px; border-radius: 12px; }
.macro-strip-row { display: flex; border-bottom: 1px solid var(--border); }
.macro-strip-row:last-child { border-bottom: none; }
.macro-cell { flex: 1; padding: 10px 6px; text-align: center; border-right: 1px solid var(--border); }
.macro-cell:last-child { border-right: none; }
.macro-cell-val { font-size: 16px; font-weight: 800; }
.macro-cell-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }
.macro-cell-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
.macro-cell-fill { height: 100%; border-radius: 2px; }
.macro-cal-big { font-size: 28px; font-weight: 800; }
.macro-cal-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* MEAL CARDS WITH RING */
.meal-list { padding: 0 12px; }
.meal-row { background: var(--bg2); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.meal-row-header { display: flex; align-items: center; padding: 12px 14px; gap: 12px; }
.meal-icon-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.meal-icon-wrap svg.ring-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); opacity: 0; }
.meal-icon-wrap svg.ring-svg.visible { animation: ring-in .5s ease forwards; }
.meal-icon-wrap svg.ring-svg circle.ring-progress { transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }

/* coil */
.coil-wrap { position: absolute; top: 0; left: 0; width: 56px; height: 56px; pointer-events: none; }
.coil-wrap span {
  position: absolute; inset: 0; border-radius: 50%;
  border: 5px solid rgba(255,255,255,.07);
  border-top-color: var(--coil-c, #3DDC84);
  animation: coil-spin 1.2s linear infinite;
}
.coil-wrap span:nth-child(2) { inset: 9%; animation-delay: -.3s; }
.coil-wrap span:nth-child(3) { inset: 18%; animation-delay: -.6s; }
.coil-wrap span:nth-child(4) { inset: 27%; animation-delay: -.9s; }
.coil-wrap.done { animation: coil-out .4s ease forwards; }
.meal-icon-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.meal-row-info { flex: 1; }
.meal-row-title { font-size: 16px; font-weight: 700; }
.meal-row-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.meal-row-plus { width: 32px; height: 32px; border-radius: 50%; background: var(--green); border: none; color: #000; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 300; flex-shrink: 0; }
.meal-row-items { border-top: 1px solid var(--border); }
.food-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 8px; }
.food-row:last-child { border-bottom: none; }
.food-row-name { font-size: 14px; font-weight: 600; }
.food-row-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.food-row-cal { font-size: 14px; font-weight: 700; color: var(--green); margin-right: 6px; flex-shrink: 0; }
.food-row-del { background: rgba(255,77,109,.12); border: none; color: var(--red); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ADD PAGE */
.add-topbar { padding: 14px 16px 10px; }
.add-topbar h2 { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
.meal-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.meal-tab { background: var(--bg3); border: none; border-radius: 20px; padding: 7px 13px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2); font-family: inherit; }
.meal-tab.active { background: rgba(61,220,132,.15); color: var(--green); }
.search-box { padding: 10px 16px; }
.search-inp { width: 100%; padding: 12px 16px; border: none; border-radius: 12px; font-size: 15px; background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
.search-inp::placeholder { color: var(--text3); }
.food-list { padding: 0 12px; }
.food-item-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; gap: 10px; }
.food-item-name { font-size: 15px; font-weight: 700; }
.food-item-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.food-item-add { width: 32px; height: 32px; background: rgba(61,220,132,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 20px; flex-shrink: 0; }

/* STATS */
.page-topbar { padding: 14px 16px 10px; }
.page-topbar h2 { font-size: 20px; font-weight: 800; }
.page-topbar p { font-size: 13px; color: var(--text2); margin-top: 2px; }
.stats-card { background: var(--bg2); border-radius: 12px; margin: 0 12px 10px; padding: 14px; }
.stats-chart { display: flex; align-items: flex-end; gap: 5px; height: 80px; margin: 10px 0 6px; }
.s-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.s-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--bg3); min-height: 3px; }
.s-bar.today { background: var(--green); }
.s-bar-lbl { font-size: 10px; color: var(--text3); font-weight: 600; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 12px 10px; }
.stat-tile { background: var(--bg2); border-radius: 12px; padding: 14px; }
.stat-tile-val { font-size: 20px; font-weight: 800; }
.stat-tile-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
.macro-bars { padding: 0 12px; }
.mbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.mbar-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.mbar-name { font-size: 13px; color: var(--text2); width: 70px; font-weight: 500; }
.mbar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.mbar-fill { height: 100%; border-radius: 3px; }
.mbar-val { font-size: 13px; font-weight: 700; width: 34px; text-align: right; }

/* PROFILE */
.profile-topbar { padding: 14px 16px 16px; }
.profile-user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.profile-user-name { font-size: 20px; font-weight: 800; }
.profile-user-sub { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }
.profile-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.profile-stats-row { display: flex; gap: 8px; }
.profile-stat-btn { flex: 1; background: var(--bg3); border-radius: 12px; padding: 11px 10px; display: flex; align-items: center; gap: 8px; }
.psb-icon { font-size: 18px; }
.psb-val { font-size: 15px; font-weight: 800; }
.psb-lbl { font-size: 10px; color: var(--text2); }
.settings-list { margin: 0 12px; }
.settings-group { background: var(--bg2); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.settings-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 12px; }
.settings-item:last-child { border-bottom: none; }
.si-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.si-label { flex: 1; font-size: 15px; font-weight: 600; }
.si-right { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.si-arrow { font-size: 18px; color: var(--text3); }

/* MODALS */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: flex-end; z-index: 200; }
.overlay.open { display: flex; }
.sheet { background: var(--bg2); border-radius: 22px 22px 0 0; padding: 10px 18px 40px; width: 100%; max-height: 88vh; overflow-y: auto; }
.sheet-handle { width: 36px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.sheet-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.g-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.g-inp { flex: 1; text-align: center; font-size: 38px; font-weight: 800; border: 2px solid var(--bg3); border-radius: 14px; padding: 12px; outline: none; font-family: inherit; color: var(--text); background: var(--bg3); }
.g-inp:focus { border-color: var(--green); }
.g-unit { font-size: 15px; font-weight: 700; color: var(--text2); }
.q-btns { display: flex; gap: 8px; margin-bottom: 14px; }
.q-btn { flex: 1; background: var(--bg3); border: none; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: var(--text2); }
.cal-prev { text-align: center; font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 16px; }
.cal-prev small { font-size: 14px; color: var(--text2); font-weight: 500; }
.btn-green { width: 100%; background: var(--green); color: #000; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; }
.btn-ghost { width: 100%; background: none; border: none; color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 10px; padding: 8px; }
.f-row { margin-bottom: 10px; }
.f-lbl { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.f-inp { width: 100%; padding: 12px 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; outline: none; font-family: inherit; color: var(--text); background: var(--bg3); }
</style>
</head>
<body>

<!-- DIARY -->
<div id="page-diary" class="page active">
  <div class="diary-topbar">
    <div class="diary-topbar-left">
      <h2>Сегодня <span id="week-num" style="font-size:13px;color:var(--text2);font-weight:500"></span></h2>
      <p id="today-label"></p>
    </div>
    <button class="fire-btn" onclick="openStreak()">
      <svg class="fire-svg inactive" id="fire-emoji" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fg1" cx="50%" cy="80%" r="60%">
            <stop offset="0%" stop-color="#FFF176"/>
            <stop offset="40%" stop-color="#FFB300"/>
            <stop offset="100%" stop-color="#E53935"/>
          </radialGradient>
          <radialGradient id="fg2" cx="50%" cy="70%" r="50%">
            <stop offset="0%" stop-color="#FFEE58"/>
            <stop offset="100%" stop-color="#FF6F00"/>
          </radialGradient>
        </defs>
        <!-- outer flame -->
        <path d="M50 5 C50 5 65 25 68 40 C72 30 70 18 65 10 C75 22 80 38 78 55 C82 48 83 38 80 28 C88 42 90 60 85 75 C88 70 91 62 90 52 C95 65 93 85 82 97 C74 107 62 112 50 112 C38 112 26 107 18 97 C7 85 5 65 10 52 C9 62 12 70 15 75 C10 60 12 42 20 28 C17 38 18 48 22 55 C20 38 25 22 35 10 C30 18 28 30 32 40 C35 25 50 5 50 5Z" fill="url(#fg1)"/>
        <!-- inner flame -->
        <path d="M50 35 C50 35 58 48 59 58 C62 52 61 44 58 38 C63 46 65 57 62 67 C64 63 65 57 64 51 C67 59 66 70 61 78 C57 84 54 87 50 87 C46 87 43 84 39 78 C34 70 33 59 36 51 C35 57 36 63 38 67 C35 57 37 46 42 38 C39 44 38 52 41 58 C42 48 50 35 50 35Z" fill="url(#fg2)"/>
        <!-- inner glow core -->
        <ellipse cx="50" cy="78" rx="10" ry="14" fill="#FFFDE7" opacity="0.7"/>
      </svg>
      <span class="fire-badge" id="fire-badge"></span>
    </button>
  </div>
  <div class="week-strip" id="week-strip"></div>
  <div class="macro-strip">
    <div class="macro-strip-row">
      <div class="macro-cell" style="flex:1.5;text-align:left;padding-left:14px">
        <div class="macro-cal-big" id="eaten-val">0</div>
        <div class="macro-cal-sub">ккал съедено</div>
      </div>
      <div class="macro-cell" style="flex:1.5;text-align:right;padding-right:14px;border-right:none">
        <div class="macro-cal-big" id="remain-val" style="color:var(--green)">0</div>
        <div class="macro-cal-sub" id="remain-lbl">осталось</div>
      </div>
    </div>
    <div class="macro-strip-row">
      <div class="macro-cell">
        <div class="macro-cell-val" id="m-fat">0г</div>
        <div class="macro-cell-lbl">Жиры</div>
        <div class="macro-cell-bar"><div class="macro-cell-fill" id="mb-fat" style="background:var(--blue);width:0%"></div></div>
      </div>
      <div class="macro-cell">
        <div class="macro-cell-val" id="m-carbs">0г</div>
        <div class="macro-cell-lbl">Углеводы</div>
        <div class="macro-cell-bar"><div class="macro-cell-fill" id="mb-carbs" style="background:var(--orange);width:0%"></div></div>
      </div>
      <div class="macro-cell">
        <div class="macro-cell-val" id="m-protein">0г</div>
        <div class="macro-cell-lbl">Белки</div>
        <div class="macro-cell-bar"><div class="macro-cell-fill" id="mb-protein" style="background:var(--green);width:0%"></div></div>
      </div>
      <div class="macro-cell" style="border-right:none">
        <div class="macro-cell-val" id="m-goal">2000</div>
        <div class="macro-cell-lbl">Цель</div>
        <div class="macro-cell-bar"><div class="macro-cell-fill" id="mb-goal" style="background:var(--yellow);width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="meal-list" id="meals-container"></div>
</div>

<!-- ADD -->
<div id="page-add" class="page">
  <div class="add-topbar">
    <h2>Добавить еду</h2>
    <div class="meal-tabs" id="meal-tabs"></div>
  </div>
  <div class="search-box">
    <input class="search-inp" id="search-input" placeholder="🔍 Поиск продукта..." oninput="filterFoods()">
  </div>
  <div class="food-list" id="food-list"></div>
</div>

<!-- STATS -->
<div id="page-stats" class="page">
  <div class="page-topbar"><h2>Статистика</h2><p>За последние 7 дней</p></div>
  <div class="stats-card">
    <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Калории</div>
    <div class="stats-chart" id="stats-chart"></div>
  </div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="macro-bars" id="macro-bars"></div>
</div>

<!-- PROFILE -->
<div id="page-profile" class="page">
  <div class="profile-topbar">
    <div class="profile-user-row">
      <div>
        <div class="profile-user-name" id="p-name-display">Пользователь</div>
        <div class="profile-user-sub">Бесплатный аккаунт</div>
      </div>
      <div class="profile-avatar">👤</div>
    </div>
    <div class="profile-stats-row">
      <div class="profile-stat-btn"><div class="psb-icon">🍽</div><div><div class="psb-val" id="qs-cal">0</div><div class="psb-lbl">ккал сегодня</div></div></div>
      <div class="profile-stat-btn"><div class="psb-icon">⚖️</div><div><div class="psb-val" id="qs-weight">—</div><div class="psb-lbl">кг</div></div></div>
    </div>
  </div>
  <div class="settings-list">
    <div class="settings-group">
      <div class="settings-item" onclick="openSheet('goals')">
        <div class="si-icon" style="background:rgba(61,220,132,.12)">🎯</div>
        <div class="si-label">Цели питания</div>
        <div class="si-right"><span id="s-goal">2000 ккал</span><span class="si-arrow">›</span></div>
      </div>
      <div class="settings-item" onclick="openSheet('body')">
        <div class="si-icon" style="background:rgba(74,158,255,.12)">💪</div>
        <div class="si-label">Параметры тела</div>
        <div class="si-right"><span id="s-body">—</span><span class="si-arrow">›</span></div>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-item" onclick="openSheet('calc')">
        <div class="si-icon" style="background:rgba(255,140,0,.12)">⚡</div>
        <div class="si-label">Рассчитать норму калорий</div>
        <div class="si-right"><span class="si-arrow">›</span></div>
      </div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('diary',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Дневник
  </button>
  <button class="nav-btn" onclick="showPage('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Добавить
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Статистика
  </button>
  <button class="nav-btn" onclick="showPage('profile',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Профиль
  </button>
</nav>

<!-- ADD FOOD MODAL -->
<div class="overlay" id="add-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>

<script>
const MEALS = ['Завтрак','Обед','Ужин','Перекус'];
const MEAL_COLORS = {'Завтрак':'#FFB800','Обед':'#3DDC84','Ужин':'#4A9EFF','Перекус':'#A0522D'};
const MEAL_BG = {'Завтрак':'#2A2415','Обед':'#111318','Ужин':'#111318','Перекус':'#1A1008'};

      <path d="M13 20 C12 18 13 17 16 16 C20 15 26 16 29 18 C31 20 30 25 27 26 C23 28 17 28 15 26 C13 24 13 22 13 20Z" fill="#C62828"/>

let profile = {goal:2000,protein_goal:150,fat_goal:70,carbs_goal:250};
let foods = [];
let selFood = null;
let activeMeal = 'Обед';
let mealTargets = {};
let appInited = false;       // coil только один раз при старте
let cachedEntries = null;    // кеш дневника
let cachedProfile = null;    // кеш профиля
let cachedTargets = null;    // кеш целей
let ringValues = {};         // текущие значения колец {mealId: offset}

if (window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

function uid(){
  if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user)
    return String(Telegram.WebApp.initDataUnsafe.user.id);
  return 'default';
}

async function api(path,opts={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json','X-User-Id':uid()},...opts});
  return r.json();
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  // Показываем кешированные данные сразу, потом обновляем в фоне
  if(name==='diary') renderDiary(); // только рендер без запросов
  if(name==='stats') loadStats();
  if(name==='profile') renderProfile();
  if(name==='add') initAdd();
}

function buildWeek(){
  const now=new Date();
  const ds=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const el=document.getElementById('week-strip');
  el.innerHTML='';
  for(let i=-3;i<=3;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);
    const div=document.createElement('div');
    div.className='week-day';
    div.innerHTML=`<div class="week-day-name">${ds[d.getDay()]}</div><div class="week-day-num${i===0?' today':''}">${d.getDate()}</div>`;
    el.appendChild(div);
  }
}

function drawMealRing(id, eaten, target, color) {
  const size = 56;
  const r = 24;
  const circ = 2 * Math.PI * r;
  const prog = target > 0 ? Math.min(eaten / target, 1) : 0;
  const offset = circ * (1 - prog);
  return `<svg class="ring-svg" id="ring-${id}" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2A2D35" stroke-width="6"/>
    <circle class="ring-progress" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
  </svg>`;
}

function buildMealCard(mt, items, mc, target, color) {
  const mealId = mt.replace(/[^а-яa-z]/gi,'');
  const div = document.createElement('div');
  div.className = 'meal-row';
  div.innerHTML = `
    <div class="meal-row-header">
      <div class="meal-icon-wrap">
        ${drawMealRing(mealId, mc, target, color)}
        <div class="coil-wrap" id="coil-${mealId}" style="--coil-c:${color}">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="meal-icon-emoji">${getMealSVG(mt)}</div>
      </div>
      <div class="meal-row-info">
        <div class="meal-row-title">${mt}</div>
        <div class="meal-row-sub">${mc>0?mc+' / ':''}<span style="color:${color}">${target} ккал</span></div>
      </div>
      <button class="meal-row-plus" onclick="goAdd('${mt}')">+</button>
    </div>
    ${items.length?`<div class="meal-row-items">${items.map(e=>`
      <div class="food-row">
        <div style="flex:1">
          <div class="food-row-name">${e.name}</div>
          <div class="food-row-meta">${e.grams}г · Б:${e.protein}г У:${e.carbs}г Ж:${e.fat}г</div>
        </div>
        <div class="food-row-cal">${e.cal}</div>
        <button class="food-row-del" onclick="delEntry(${e.id})">✕</button>
      </div>
    `).join('')}</div>`:''}
  `;
  return { div, mealId, mc, target, circ: 2 * Math.PI * 24, color };
}

async function loadDiary(){
  // Загружаем данные параллельно
  const [prof, entries, targets, streak] = await Promise.all([
    api('/api/profile'),
    api('/api/diary'),
    api('/api/meal_targets'),
    api('/api/streak').catch(()=>({current_streak:0}))
  ]);

  // Обновляем кеш
  cachedProfile = prof;
  cachedEntries = entries;
  cachedTargets = targets;
  profile = prof;
  mealTargets = targets;

  // Обновляем streak
  const fire = document.getElementById('fire-emoji');
  const badge = document.getElementById('fire-badge');
  if(streak.current_streak > 0){
    fire.classList.remove('inactive'); fire.classList.add('active');
    badge.textContent = streak.current_streak; badge.style.display = 'block';
  } else {
    fire.classList.remove('active'); fire.classList.add('inactive');
    badge.style.display = 'none';
  }

  renderDiary();
}

function renderDiary(){
  if(!cachedEntries || !cachedProfile) return;
  const entries = cachedEntries;
  profile = cachedProfile;
  mealTargets = cachedTargets || {};

  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const now=new Date();
  const dns=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  document.getElementById('today-label').textContent=`${dns[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  buildWeek();

  if(profile.joined_date){
    const joined = new Date(profile.joined_date);
    const diffDays = Math.floor((now - joined) / 86400000);
    const weekN = Math.floor(diffDays / 7) + 1;
    document.getElementById('week-num').textContent = `· Неделя ${weekN}`;
  }

  const t={cal:0,p:0,f:0,c:0};
  entries.forEach(e=>{t.cal+=e.cal;t.p+=e.protein;t.f+=e.fat;t.c+=e.carbs;});
  const goal=profile.goal||2000;
  const rem=goal-Math.round(t.cal);

  document.getElementById('eaten-val').textContent=Math.round(t.cal);
  document.getElementById('remain-val').textContent=Math.abs(rem);
  document.getElementById('remain-val').style.color=rem>=0?'var(--green)':'var(--red)';
  document.getElementById('remain-lbl').textContent=rem>=0?'осталось':'превышение';
  document.getElementById('m-goal').textContent=goal;
  document.getElementById('m-protein').textContent=t.p.toFixed(0)+'г';
  document.getElementById('m-carbs').textContent=t.c.toFixed(0)+'г';
  document.getElementById('m-fat').textContent=t.f.toFixed(0)+'г';
  document.getElementById('mb-protein').style.width=Math.min(t.p/(profile.protein_goal||150)*100,100)+'%';
  document.getElementById('mb-carbs').style.width=Math.min(t.c/(profile.carbs_goal||250)*100,100)+'%';
  document.getElementById('mb-fat').style.width=Math.min(t.f/(profile.fat_goal||70)*100,100)+'%';
  document.getElementById('mb-goal').style.width=Math.min(t.cal/goal*100,100)+'%';

  const c=document.getElementById('meals-container');
  c.innerHTML='';

  MEALS.forEach(mt=>{
    const items=entries.filter(e=>e.meal_type===mt);
    const mc=items.reduce((s,e)=>s+e.cal,0);
    const target=mealTargets[mt]||0;
    const color=MEAL_COLORS[mt];
    const mealId=mt.replace(/[^а-яa-z]/gi,'');
    const { div } = buildMealCard(mt, items, mc, target, color);
    c.appendChild(div);

    const circ = 2 * Math.PI * 24;
    const ring = document.getElementById('ring-'+mealId);
    const coil = document.getElementById('coil-'+mealId);

    if (!appInited) {
      // Первый запуск — coil 1.5с потом кольцо
      setTimeout(() => {
        if(coil) { coil.classList.add('done'); setTimeout(()=>{ if(coil.parentNode) coil.remove(); }, 500); }
        if(ring) {
          ring.classList.add('visible');
          const prog = target>0 ? Math.min(mc/target,1) : 0;
          const finalOffset = circ*(1-prog);
          const circle = ring.querySelector('.ring-progress');
          if(circle) setTimeout(()=>{ circle.style.strokeDashoffset = finalOffset; }, 100);
          ringValues[mealId] = finalOffset;
        }
      }, 1500);
    } else {
      // Повторный рендер — убираем coil, обновляем кольцо плавно от текущей позиции
      if(coil) coil.remove();
      if(ring) {
        ring.style.opacity = '1';
        ring.style.transform = 'rotate(-90deg)';
        const prog = target>0 ? Math.min(mc/target,1) : 0;
        const finalOffset = circ*(1-prog);
        const circle = ring.querySelector('.ring-progress');
        if(circle) {
          const prevOffset = ringValues[mealId] !== undefined ? ringValues[mealId] : circ;
          circle.style.transition = 'none';
          circle.style.strokeDashoffset = prevOffset;
          requestAnimationFrame(()=>{
            circle.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)';
            circle.style.strokeDashoffset = finalOffset;
          });
          ringValues[mealId] = finalOffset;
        }
      }
    }
  });

  if(!appInited) setTimeout(()=>{ appInited = true; }, 2000);
}


async function delEntry(id){
  if(!confirm('Удалить?'))return;
  await api(`/api/diary/${id}`,{method:'DELETE'});
  // Обновляем кеш и рендерим без перезагрузки
  cachedEntries = await api('/api/diary');
  renderDiary();
}

function goAdd(mt){
  activeMeal=mt;
  showPage('add',document.querySelectorAll('.nav-btn')[1]);
}

async function initAdd(){
  if(!foods.length)foods=await api('/api/foods');
  document.getElementById('meal-tabs').innerHTML=MEALS.map(mt=>
    `<div class="meal-tab ${mt===activeMeal?'active':''}" onclick="selTab(this,'${mt}')">${mt}</div>`
  ).join('');
  renderFoods(foods);
}

function selTab(el,mt){
  activeMeal=mt;
  document.querySelectorAll('.meal-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function filterFoods(){
  const q=document.getElementById('search-input').value.toLowerCase();
  renderFoods(foods.filter(f=>f.name.toLowerCase().includes(q)));
}

function renderFoods(list){
  document.getElementById('food-list').innerHTML=list.map(f=>`
    <div class="food-item-row" onclick="openAddModal(${f.id})">
      <div style="flex:1">
        <div class="food-item-name">${f.name}</div>
        <div class="food-item-meta">${f.cal} ккал · Б:${f.protein}г У:${f.carbs}г Ж:${f.fat}г · на 100г</div>
      </div>
      <div class="food-item-add">+</div>
    </div>
  `).join('');
}

function openAddModal(id){
  selFood=foods.find(f=>f.id===id);
  document.getElementById('m-food-name').textContent=selFood.name;
  document.getElementById('m-food-meta').textContent=`${selFood.cal} ккал · Б:${selFood.protein}г У:${selFood.carbs}г Ж:${selFood.fat}г на 100г`;
  document.getElementById('m-grams').value=100;
  updatePreview();
  document.getElementById('add-modal').classList.add('open');
}

function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function setG(g){document.getElementById('m-grams').value=g;updatePreview();}

function updatePreview(){
  const g=parseFloat(document.getElementById('m-grams').value)||0;
  if(!selFood)return;
  document.getElementById('m-cal-prev').innerHTML=Math.round(selFood.cal*g/100)+' <small>ккал</small>';
}

async function confirmAdd(){
  const g=parseFloat(document.getElementById('m-grams').value);
  if(!g||g<=0){alert('Введите граммы');return;}
  await api('/api/diary',{method:'POST',body:JSON.stringify({food_id:selFood.id,grams:g,meal_type:activeMeal})});
  closeOverlay('add-modal');
  // Обновляем кеш в фоне и рендерим без coil
  const [entries, targets] = await Promise.all([api('/api/diary'), api('/api/meal_targets')]);
  cachedEntries = entries; cachedTargets = targets; mealTargets = targets;
  showPage('diary',document.querySelectorAll('.nav-btn')[0]);
}

async function loadStats(){
  profile=await api('/api/profile');
  const week=await api('/api/week');
  const cals=week.map(d=>d.cal);
  const mx=Math.max(...cals,profile.goal,1);
  const goal=profile.goal||2000;
  document.getElementById('stats-chart').innerHTML=week.map((d,i)=>`
    <div class="s-bar-wrap">
      <div class="s-bar ${i===6?'today':''}" style="height:${Math.round(d.cal/mx*68)}px"></div>
      <div class="s-bar-lbl">${d.day}</div>
    </div>
  `).join('');
  const act=cals.filter(c=>c>0);
  const avg=act.length?Math.round(act.reduce((a,b)=>a+b,0)/act.length):0;
  const ok=cals.filter(c=>c>0&&c<=goal).length;
  const tot=cals.reduce((a,b)=>a+b,0);
  document.getElementById('stat-grid').innerHTML=[
    {v:avg+' ккал',l:'Среднее/день'},
    {v:ok+' из 7',l:'Дней в норме'},
    {v:tot+' ккал',l:'Всего за неделю'},
    {v:(goal-avg>=0?'-':'+')+Math.abs(goal-avg)+' ккал',l:'Баланс/день'},
  ].map(s=>`<div class="stat-tile"><div class="stat-tile-val">${s.v}</div><div class="stat-tile-lbl">${s.l}</div></div>`).join('');
  document.getElementById('macro-bars').innerHTML=[
    {n:'Белки',v:Math.round(avg*0.3/4),g:profile.protein_goal||150,c:'var(--green)'},
    {n:'Углеводы',v:Math.round(avg*0.5/4),g:profile.carbs_goal||250,c:'var(--orange)'},
    {n:'Жиры',v:Math.round(avg*0.2/9),g:profile.fat_goal||70,c:'var(--blue)'},
  ].map(m=>`
    <div class="mbar-row">
      <div class="mbar-dot" style="background:${m.c}"></div>
      <div class="mbar-name">${m.n}</div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${Math.min(m.v/m.g*100,100)}%;background:${m.c}"></div></div>
      <div class="mbar-val">${m.v}г</div>
    </div>
  `).join('');
}

async function loadProfile(){
  // Используем кеш если есть, в фоне обновляем
  if(cachedProfile) renderProfile();
  const [prof, entries] = await Promise.all([api('/api/profile'), cachedEntries ? Promise.resolve(cachedEntries) : api('/api/diary')]);
  cachedProfile = prof; cachedEntries = entries; profile = prof;
  renderProfile();
}

function renderProfile(){
  if(!cachedProfile) return;
  const entries = cachedEntries || [];
  const cal = entries.reduce((s,e)=>s+e.cal,0);
  document.getElementById('qs-cal').textContent=Math.round(cal);
  document.getElementById('qs-weight').textContent=cachedProfile.weight||'—';
  document.getElementById('s-goal').textContent=(cachedProfile.goal||2000)+' ккал';
  document.getElementById('s-body').textContent=cachedProfile.weight?cachedProfile.weight+'кг':'—';
  if(window.Telegram&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user)
    document.getElementById('p-name-display').textContent=Telegram.WebApp.initDataUnsafe.user.first_name||'Пользователь';
}

function openSheet(type){
  const sh=document.getElementById('p-sheet');
  sh.classList.add('open');
  document.getElementById('ps-title').textContent=type==='goals'?'🎯 Цели питания':type==='body'?'💪 Параметры тела':'⚡ Рассчитать норму';
  const c=document.getElementById('ps-content');
  if(type==='goals'){
    c.innerHTML=`
      <div class="f-row"><div class="f-lbl">Норма калорий</div><input class="f-inp" id="fg" type="number" inputmode="numeric" value="${profile.goal||2000}"></div>
      <div class="f-row"><div class="f-lbl">Белки (г)</div><input class="f-inp" id="fp" type="number" inputmode="numeric" value="${profile.protein_goal||150}"></div>
      <div class="f-row"><div class="f-lbl">Жиры (г)</div><input class="f-inp" id="ff" type="number" inputmode="numeric" value="${profile.fat_goal||70}"></div>
      <div class="f-row"><div class="f-lbl">Углеводы (г)</div><input class="f-inp" id="fc" type="number" inputmode="numeric" value="${profile.carbs_goal||250}"></div>
      <button class="btn-green" onclick="saveGoals()">💾 Сохранить</button>
      <button class="btn-ghost" onclick="closeOverlay('p-sheet')">Отмена</button>`;
  } else if(type==='body'){
    c.innerHTML=`
      <div class="f-row"><div class="f-lbl">Вес (кг)</div><input class="f-inp" id="fw" type="number" inputmode="decimal" value="${profile.weight||''}"></div>
      <div class="f-row"><div class="f-lbl">Рост (см)</div><input class="f-inp" id="fh" type="number" inputmode="numeric" value="${profile.height||''}"></div>
      <div class="f-row"><div class="f-lbl">Возраст</div><input class="f-inp" id="fa" type="number" inputmode="numeric" value="${profile.age||''}"></div>
      <div class="f-row"><div class="f-lbl">Цель</div>
        <select class="f-inp" id="fgt" style="color:var(--text)">
          <option value="lose" ${profile.goal_type==='lose'?'selected':''}>🔥 Похудение</option>
          <option value="maintain" ${!profile.goal_type||profile.goal_type==='maintain'?'selected':''}>⚖️ Поддержание веса</option>
          <option value="gain_weight" ${profile.goal_type==='gain_weight'?'selected':''}>📈 Набор веса</option>
          <option value="muscle" ${profile.goal_type==='muscle'?'selected':''}>💪 Набор мышц</option>
        </select>
      </div>
      <button class="btn-green" onclick="saveBody()">💾 Сохранить и пересчитать КБЖУ</button>
      <button class="btn-ghost" onclick="closeOverlay('p-sheet')">Отмена</button>`;
  } else {
    c.innerHTML=`
      <div class="f-row"><div class="f-lbl">Пол</div><select class="f-inp" id="fgn" style="color:var(--text)"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
      <div class="f-row"><div class="f-lbl">Активность</div><select class="f-inp" id="fact" style="color:var(--text)"><option value="1.2">Минимальная</option><option value="1.375">Лёгкая</option><option value="1.55" selected>Умеренная</option><option value="1.725">Высокая</option><option value="1.9">Очень высокая</option></select></div>
      <button class="btn-green" onclick="calcBMR()">⚡ Рассчитать</button>
      <button class="btn-ghost" onclick="closeOverlay('p-sheet')">Отмена</button>`;
  }
}

async function saveGoals(){
  profile.goal=parseInt(document.getElementById('fg').value);
  profile.protein_goal=parseInt(document.getElementById('fp').value);
  profile.fat_goal=parseInt(document.getElementById('ff').value);
  profile.carbs_goal=parseInt(document.getElementById('fc').value);
  await api('/api/profile',{method:'POST',body:JSON.stringify(profile)});
  closeOverlay('p-sheet');loadProfile();
}

async function saveBody(){
  profile.weight=parseFloat(document.getElementById('fw').value);
  profile.height=parseFloat(document.getElementById('fh').value);
  profile.age=parseInt(document.getElementById('fa').value);
  profile.goal_type=document.getElementById('fgt').value;
  await api('/api/profile',{method:'POST',body:JSON.stringify(profile)});

  // Авторасчёт КБЖУ на основе новых данных
  const macros = await api('/api/calc_macros');
  profile.protein_goal = macros.protein;
  profile.fat_goal = macros.fat;
  profile.carbs_goal = macros.carbs;
  await api('/api/profile',{method:'POST',body:JSON.stringify(profile)});

  const goalNames = {lose:'Похудение',maintain:'Поддержание веса',gain_weight:'Набор веса',muscle:'Набор мышц'};
  alert(`✅ Сохранено!\n\nЦель: ${goalNames[profile.goal_type]}\nБелки: ${macros.protein}г\nЖиры: ${macros.fat}г\nУглеводы: ${macros.carbs}г`);
  closeOverlay('p-sheet');
  loadProfile();
  mealTargets = await api('/api/meal_targets');
}

function calcBMR(){
  const w=profile.weight,h=profile.height,a=profile.age;
  if(!w||!h||!a){alert('Сначала заполните параметры тела');closeOverlay('p-sheet');openSheet('body');return;}
  const g=document.getElementById('fgn').value;
  const act=parseFloat(document.getElementById('fact').value);
  const bmr=g==='male'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  const gt=profile.goal_type||'maintain';
  const adj=gt==='lose'?-500:gt==='gain_weight'?400:gt==='muscle'?300:0;
  profile.goal=Math.round(bmr*act+adj);
  profile.activity=act;
  api('/api/profile',{method:'POST',body:JSON.stringify(profile)}).then(()=>{
    api('/api/calc_macros').then(macros=>{
      profile.protein_goal=macros.protein;
      profile.fat_goal=macros.fat;
      profile.carbs_goal=macros.carbs;
      api('/api/profile',{method:'POST',body:JSON.stringify(profile)});
      const goalNames={lose:'Похудение',maintain:'Поддержание',gain_weight:'Набор веса',muscle:'Набор мышц'};
      alert(`✅ Норма рассчитана!\n\nКалории: ${profile.goal} ккал/день\nБелки: ${macros.protein}г\nЖиры: ${macros.fat}г\nУглеводы: ${macros.carbs}г`);
      closeOverlay('p-sheet');
      loadProfile();
    });
  });
}

            <ellipse cx="50" cy="78" rx="10" ry="14" fill="#FFFDE7" opacity="0.7"/>

          </div>

        <div style="display:flex;gap:4px;justify-content:space-between">
          ${week.map((d,i)=>`
            <div style="flex:1;text-align:center">
              <div style="width:34px;height:34px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:15px;background:${d.cal>0?'var(--green)':'var(--border)'};color:${d.cal>0?'#000':'var(--text3)'}${i===6?';outline:2px solid var(--green);outline-offset:2px':''}">${d.cal>0?'✓':''}</div>

  document.body.appendChild(modal);
}

loadDiary();
</script>
