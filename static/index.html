<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalorei</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F0F;
    --bg2: #1A1A1A;
    --bg3: #252525;
    --card: #1A1A1A;
    --green: #00D97E;
    --green-l: rgba(0,217,126,0.12);
    --text: #F5F5F5;
    --text2: #888;
    --text3: #555;
    --border: #252525;
    --orange: #FF8C42;
    --blue: #4A90D9;
    --red: #FF4D6D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; border: none; background: none; cursor: pointer; color: var(--text3); font-size: 10px; font-family: 'Manrope', sans-serif; font-weight: 600; gap: 3px; transition: color .2s; }
  .nav-btn.active { color: var(--green); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; padding-bottom: 90px; }
  .page.active { display: block; }

  /* ═══════════════ ДНЕВНИК ═══════════════ */
  .diary-header { padding: 18px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
  .diary-header-title { font-size: 22px; font-weight: 800; }
  .diary-header-date { font-size: 13px; color: var(--text2); font-weight: 500; }

  /* CALENDAR ROW */
  .calendar-row { display: flex; gap: 4px; padding: 0 16px 16px; overflow-x: auto; scrollbar-width: none; }
  .calendar-row::-webkit-scrollbar { display: none; }
  .cal-item { flex-shrink: 0; width: 42px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .cal-item-day { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; }
  .cal-item-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--text2); }
  .cal-item-num.today { background: var(--green); color: #000; }
  .cal-item-num.has-data::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--green); position: absolute; bottom: -6px; }
  .cal-item-num.has-data { position: relative; }

  /* MACRO BAR */
  .macro-bar-section { background: var(--bg2); margin: 0 16px 16px; border-radius: 16px; padding: 14px 16px; }
  .macro-bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .macro-bar-cal { font-size: 28px; font-weight: 800; }
  .macro-bar-cal span { font-size: 14px; color: var(--text2); font-weight: 500; }
  .macro-bar-remaining { font-size: 12px; font-weight: 600; }
  .macro-cols { display: flex; gap: 0; }
  .macro-col { flex: 1; text-align: center; padding: 8px 4px; border-right: 1px solid var(--border); }
  .macro-col:last-child { border-right: none; }
  .macro-col-val { font-size: 15px; font-weight: 800; }
  .macro-col-name { font-size: 10px; color: var(--text2); font-weight: 600; margin-top: 2px; }
  .macro-col-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .macro-col-fill { height: 100%; border-radius: 2px; }

  /* MEAL CARDS */
  .meals-section { padding: 0 16px; }
  .meal-card { background: var(--bg2); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
  .meal-card-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; }
  .meal-card-icon { font-size: 22px; margin-right: 12px; }
  .meal-card-info { flex: 1; }
  .meal-card-title { font-size: 16px; font-weight: 700; }
  .meal-card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .meal-card-add { width: 34px; height: 34px; background: var(--green-l); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 22px; line-height: 1; cursor: pointer; border: none; flex-shrink: 0; }
  .meal-items { border-top: 1px solid var(--border); }
  .meal-food-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
  .meal-food-item:last-child { border-bottom: none; }
  .meal-food-name { font-size: 13px; font-weight: 600; }
  .meal-food-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .meal-food-right { display: flex; align-items: center; gap: 8px; }
  .meal-food-cal { font-size: 13px; font-weight: 700; color: var(--green); }
  .meal-del-btn { background: rgba(255,77,109,0.1); border: none; color: var(--red); width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }

  /* ═══════════════ ДОБАВИТЬ ═══════════════ */
  .add-header { padding: 18px 20px 14px; }
  .add-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 14px; }
  .meal-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .meal-tab { background: var(--bg3); border: none; border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text2); font-family: 'Manrope', sans-serif; transition: all .2s; }
  .meal-tab.active { background: var(--green-l); color: var(--green); }
  .search-wrap { padding: 0 16px 10px; }
  .search-input { width: 100%; padding: 13px 16px; border: none; border-radius: 14px; font-size: 14px; background: var(--bg2); outline: none; font-family: 'Manrope', sans-serif; font-weight: 500; color: var(--text); }
  .search-input::placeholder { color: var(--text3); }
  .food-list { padding: 0 16px; }
  .food-list-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .food-list-name { font-size: 14px; font-weight: 700; }
  .food-list-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .food-add-btn { width: 32px; height: 32px; background: var(--green-l); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 20px; flex-shrink: 0; }

  /* ═══════════════ СТАТИСТИКА ═══════════════ */
  .stats-header { padding: 18px 20px 14px; }
  .stats-header h2 { font-size: 22px; font-weight: 800; }
  .stats-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .stats-card { background: var(--bg2); border-radius: 16px; margin: 0 16px 12px; padding: 16px; }
  .week-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin: 12px 0 8px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 5px 5px 0 0; background: var(--bg3); min-height: 4px; }
  .bar.today { background: var(--green); }
  .bar-lbl { font-size: 10px; color: var(--text3); font-weight: 600; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 12px; }
  .stat-card { background: var(--bg2); border-radius: 14px; padding: 14px; }
  .stat-val { font-size: 20px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 3px; }
  .macro-row-stats { padding: 0 16px; }
  .macro-stat { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .macro-stat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .macro-stat-name { font-size: 13px; font-weight: 600; color: var(--text2); width: 72px; }
  .macro-stat-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .macro-stat-fill { height: 100%; border-radius: 3px; }
  .macro-stat-val { font-size: 13px; font-weight: 700; width: 36px; text-align: right; }

  /* ═══════════════ ПРОФИЛЬ ═══════════════ */
  .profile-header { padding: 18px 20px 16px; }
  .profile-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .profile-name { font-size: 22px; font-weight: 800; }
  .profile-type { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }
  .profile-avatar { width: 50px; height: 50px; background: var(--bg3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .profile-quick { display: flex; gap: 8px; }
  .profile-quick-btn { flex: 1; background: var(--bg3); border-radius: 14px; padding: 12px 10px; display: flex; align-items: center; gap: 8px; }
  .profile-quick-icon { font-size: 18px; }
  .profile-quick-val { font-size: 14px; font-weight: 800; }
  .profile-quick-lbl { font-size: 10px; color: var(--text2); font-weight: 600; }
  .settings-group { background: var(--bg2); border-radius: 16px; margin: 12px 16px 0; overflow: hidden; }
  .settings-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .settings-row:last-child { border-bottom: none; }
  .settings-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .settings-label { font-size: 15px; font-weight: 600; flex: 1; }
  .settings-right { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .settings-arrow { color: var(--text3); font-size: 18px; }

  /* ═══════════════ MODALS ═══════════════ */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: flex-end; z-index: 200; backdrop-filter: blur(6px); }
  .overlay.open { display: flex; }
  .bottom-sheet { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 12px 20px 44px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .sheet-handle { width: 36px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .sheet-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
  .grams-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .grams-input { flex: 1; text-align: center; font-size: 40px; font-weight: 800; border: 2px solid var(--bg3); border-radius: 14px; padding: 12px; outline: none; font-family: 'Manrope', sans-serif; color: var(--text); background: var(--bg3); transition: border .2s; }
  .grams-input:focus { border-color: var(--green); }
  .grams-unit { font-size: 15px; font-weight: 700; color: var(--text2); }
  .quick-g { display: flex; gap: 8px; margin-bottom: 14px; }
  .quick-g-btn { flex: 1; background: var(--bg3); border: none; border-radius: 10px; padding: 9px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Manrope', sans-serif; color: var(--text2); }
  .cal-preview { text-align: center; font-size: 38px; font-weight: 800; color: var(--green); margin-bottom: 18px; }
  .cal-preview small { font-size: 15px; color: var(--text2); font-weight: 600; }
  .green-btn { width: 100%; background: var(--green); color: #000; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: 'Manrope', sans-serif; }
  .ghost-btn { width: 100%; background: none; border: none; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Manrope', sans-serif; margin-top: 12px; }
  .field-group { margin-bottom: 12px; }
  .field-lbl { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .field-inp { width: 100%; padding: 13px 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; outline: none; font-family: 'Manrope', sans-serif; color: var(--text); background: var(--bg3); }
</style>
</head>
<body>

<!-- ДНЕВНИК -->
<div id="page-diary" class="page active">
  <div class="diary-header">
    <div>
      <div class="diary-header-title">Сегодня</div>
      <div class="diary-header-date" id="today-label"></div>
    </div>
  </div>

  <div class="calendar-row" id="calendar"></div>

  <div class="macro-bar-section">
    <div class="macro-bar-top">
      <div class="macro-bar-cal"><span>Ккал </span><span id="eaten-val">0</span></div>
      <div class="macro-bar-remaining" id="remaining-text" style="color:var(--green)">осталось 0</div>
    </div>
    <div class="macro-cols">
      <div class="macro-col">
        <div class="macro-col-val" id="m-protein">0г</div>
        <div class="macro-col-name">Белки</div>
        <div class="macro-col-bar"><div class="macro-col-fill" id="mb-protein" style="background:var(--green);width:0%"></div></div>
      </div>
      <div class="macro-col">
        <div class="macro-col-val" id="m-carbs">0г</div>
        <div class="macro-col-name">Углеводы</div>
        <div class="macro-col-bar"><div class="macro-col-fill" id="mb-carbs" style="background:var(--orange);width:0%"></div></div>
      </div>
      <div class="macro-col">
        <div class="macro-col-val" id="m-fat">0г</div>
        <div class="macro-col-name">Жиры</div>
        <div class="macro-col-bar"><div class="macro-col-fill" id="mb-fat" style="background:var(--blue);width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="meals-section" id="meals-container"></div>
</div>

<!-- ДОБАВИТЬ -->
<div id="page-add" class="page">
  <div class="add-header">
    <h2>Добавить еду</h2>
    <div class="meal-tabs" id="meal-tabs"></div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍  Поиск продукта..." oninput="filterFoods()">
  </div>
  <div class="food-list" id="food-list"></div>
</div>

<!-- СТАТИСТИКА -->
<div id="page-stats" class="page">
  <div class="stats-header">
    <h2>Статистика</h2>
    <p>За последние 7 дней</p>
  </div>
  <div class="stats-card">
    <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Калории</div>
    <div class="week-chart" id="week-chart"></div>
  </div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="macro-row-stats" id="avg-macros"></div>
</div>

<!-- ПРОФИЛЬ -->
<div id="page-profile" class="page">
  <div class="profile-header">
    <div class="profile-top-row">
      <div>
        <div class="profile-name" id="profile-name-display">Пользователь</div>
        <div class="profile-type">Бесплатный аккаунт</div>
      </div>
      <div class="profile-avatar">👤</div>
    </div>
    <div class="profile-quick">
      <div class="profile-quick-btn">
        <div class="profile-quick-icon">🍽</div>
        <div>
          <div class="profile-quick-val" id="qs-cal">0</div>
          <div class="profile-quick-lbl">ккал сегодня</div>
        </div>
      </div>
      <div class="profile-quick-btn">
        <div class="profile-quick-icon">⚖️</div>
        <div>
          <div class="profile-quick-val" id="qs-weight">—</div>
          <div class="profile-quick-lbl">кг</div>
        </div>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-row" onclick="openSheet('goals')">
      <div class="settings-icon" style="background:rgba(0,217,126,0.12)">🎯</div>
      <div class="settings-label">Цели питания</div>
      <div class="settings-right"><span id="s-goal">2000 ккал</span><span class="settings-arrow">›</span></div>
    </div>
    <div class="settings-row" onclick="openSheet('body')">
      <div class="settings-icon" style="background:rgba(74,144,217,0.12)">💪</div>
      <div class="settings-label">Параметры тела</div>
      <div class="settings-right"><span id="s-body">—</span><span class="settings-arrow">›</span></div>
    </div>
    <div class="settings-row" onclick="openSheet('calc')">
      <div class="settings-icon" style="background:rgba(255,140,66,0.12)">⚡</div>
      <div class="settings-label">Рассчитать норму</div>
      <div class="settings-right"><span class="settings-arrow">›</span></div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('diary',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Дневник
  </button>
  <button class="nav-btn" onclick="showPage('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Добавить
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Статистика
  </button>
  <button class="nav-btn" onclick="showPage('profile',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Профиль
  </button>
</nav>

<!-- ADD FOOD MODAL -->
<div class="overlay" id="add-modal">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="modal-food-name"></div>
    <div class="sheet-sub" id="modal-food-meta"></div>
    <div class="grams-row">
      <input class="grams-input" type="number" inputmode="numeric" id="modal-grams" value="100" oninput="updatePreview()">
      <div class="grams-unit">г</div>
    </div>
    <div class="quick-g">
      <button class="quick-g-btn" onclick="setGrams(50)">50г</button>
      <button class="quick-g-btn" onclick="setGrams(100)">100г</button>
      <button class="quick-g-btn" onclick="setGrams(150)">150г</button>
      <button class="quick-g-btn" onclick="setGrams(200)">200г</button>
    </div>
    <div class="cal-preview" id="modal-cal">0 <small>ккал</small></div>
    <button class="green-btn" onclick="confirmAdd()">✓ Добавить</button>
    <button class="ghost-btn" onclick="closeModal('add-modal')">Отмена</button>
  </div>
</div>

<!-- PROFILE SHEET -->
<div class="overlay" id="profile-sheet">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<script>
const MEAL_TYPES = ['Завтрак','Обед','Ужин','Перекус'];
const MEAL_ICONS = {'Завтрак':'🌅','Обед':'☀️','Ужин':'🌙','Перекус':'🍎'};
let profile = {goal:2000,protein_goal:150,fat_goal:70,carbs_goal:250};
let allFoods = [];
let selectedFood = null;
let activeMeal = 'Обед';

if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

function getUserId() {
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user)
    return String(Telegram.WebApp.initDataUnsafe.user.id);
  return "default";
}

async function api(path, opts={}) {
  const r = await fetch(path, {headers:{'Content-Type':'application/json','X-User-Id':getUserId()}, ...opts});
  return r.json();
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name==='diary') loadDiary();
  if (name==='stats') loadStats();
  if (name==='profile') loadProfile();
  if (name==='add') initAdd();
}

function buildCalendar() {
  const now = new Date();
  const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  for (let i=-3; i<=3; i++) {
    const d = new Date(now); d.setDate(now.getDate()+i);
    const el = document.createElement('div');
    el.className = 'cal-item';
    el.innerHTML = `<div class="cal-item-day">${days[d.getDay()]}</div><div class="cal-item-num${i===0?' today':''}">${d.getDate()}</div>`;
    cal.appendChild(el);
  }
}

async function loadDiary() {
  profile = await api('/api/profile');
  const entries = await api('/api/diary');
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const now = new Date();
  const dayNames = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  document.getElementById('today-label').textContent = `${dayNames[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  buildCalendar();

  const t = {cal:0,protein:0,fat:0,carbs:0};
  entries.forEach(e => { t.cal+=e.cal; t.protein+=e.protein; t.fat+=e.fat; t.carbs+=e.carbs; });
  const goal = profile.goal||2000;
  const rem = goal - Math.round(t.cal);

  document.getElementById('eaten-val').textContent = Math.round(t.cal);
  document.getElementById('remaining-text').textContent = rem>=0 ? `осталось ${rem}` : `превышение ${Math.abs(rem)}`;
  document.getElementById('remaining-text').style.color = rem>=0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('m-protein').textContent = t.protein.toFixed(0)+'г';
  document.getElementById('m-carbs').textContent = t.carbs.toFixed(0)+'г';
  document.getElementById('m-fat').textContent = t.fat.toFixed(0)+'г';
  document.getElementById('mb-protein').style.width = Math.min(t.protein/(profile.protein_goal||150)*100,100)+'%';
  document.getElementById('mb-carbs').style.width = Math.min(t.carbs/(profile.carbs_goal||250)*100,100)+'%';
  document.getElementById('mb-fat').style.width = Math.min(t.fat/(profile.fat_goal||70)*100,100)+'%';

  const container = document.getElementById('meals-container');
  container.innerHTML = '';
  MEAL_TYPES.forEach(mt => {
    const items = entries.filter(e=>e.meal_type===mt);
    const mtCal = items.reduce((s,e)=>s+e.cal,0);
    const card = document.createElement('div');
    card.className = 'meal-card';
    card.innerHTML = `
      <div class="meal-card-header">
        <div class="meal-card-icon">${MEAL_ICONS[mt]}</div>
        <div class="meal-card-info">
          <div class="meal-card-title">${mt}</div>
          <div class="meal-card-sub">${mtCal>0?mtCal+' ккал':'Нет записей'}</div>
        </div>
        <button class="meal-card-add" onclick="goAdd('${mt}')">+</button>
      </div>
      ${items.length>0?`<div class="meal-items">${items.map(e=>`
        <div class="meal-food-item">
          <div>
            <div class="meal-food-name">${e.name}</div>
            <div class="meal-food-meta">${e.grams}г · Б:${e.protein}г У:${e.carbs}г Ж:${e.fat}г</div>
          </div>
          <div class="meal-food-right">
            <div class="meal-food-cal">${e.cal}</div>
            <button class="meal-del-btn" onclick="delEntry(${e.id})">✕</button>
          </div>
        </div>
      `).join('')}</div>`:''}
    `;
    container.appendChild(card);
  });
}

async function delEntry(id) {
  if (!confirm('Удалить?')) return;
  await api(`/api/diary/${id}`,{method:'DELETE'});
  loadDiary();
}

function goAdd(mt) {
  activeMeal = mt;
  showPage('add', document.querySelectorAll('.nav-btn')[1]);
}

async function initAdd() {
  if (!allFoods.length) allFoods = await api('/api/foods');
  document.getElementById('meal-tabs').innerHTML = MEAL_TYPES.map(mt=>
    `<div class="meal-tab ${mt===activeMeal?'active':''}" onclick="selTab(this,'${mt}')">${MEAL_ICONS[mt]} ${mt}</div>`
  ).join('');
  renderFoods(allFoods);
}

function selTab(el,mt) {
  activeMeal=mt;
  document.querySelectorAll('.meal-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function filterFoods() {
  const q=document.getElementById('search-input').value.toLowerCase();
  renderFoods(allFoods.filter(f=>f.name.toLowerCase().includes(q)));
}

function renderFoods(foods) {
  document.getElementById('food-list').innerHTML = foods.map(f=>`
    <div class="food-list-item" onclick="openModal(${f.id})">
      <div>
        <div class="food-list-name">${f.name}</div>
        <div class="food-list-meta">${f.cal} ккал · Б:${f.protein}г У:${f.carbs}г Ж:${f.fat}г · на 100г</div>
      </div>
      <div class="food-add-btn">+</div>
    </div>
  `).join('');
}

function openModal(id) {
  selectedFood = allFoods.find(f=>f.id===id);
  document.getElementById('modal-food-name').textContent = selectedFood.name;
  document.getElementById('modal-food-meta').textContent = `${selectedFood.cal} ккал · Б:${selectedFood.protein}г У:${selectedFood.carbs}г Ж:${selectedFood.fat}г на 100г`;
  document.getElementById('modal-grams').value = 100;
  updatePreview();
  document.getElementById('add-modal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function setGrams(g) { document.getElementById('modal-grams').value=g; updatePreview(); }

function updatePreview() {
  const g = parseFloat(document.getElementById('modal-grams').value)||0;
  if (!selectedFood) return;
  document.getElementById('modal-cal').innerHTML = Math.round(selectedFood.cal*g/100)+' <small>ккал</small>';
}

async function confirmAdd() {
  const g = parseFloat(document.getElementById('modal-grams').value);
  if (!g||g<=0) { alert('Введите граммы'); return; }
  await api('/api/diary',{method:'POST',body:JSON.stringify({food_id:selectedFood.id,grams:g,meal_type:activeMeal})});
  closeModal('add-modal');
  showPage('diary',document.querySelectorAll('.nav-btn')[0]);
}

async function loadStats() {
  profile = await api('/api/profile');
  const week = await api('/api/week');
  const cals = week.map(d=>d.cal);
  const maxCal = Math.max(...cals,profile.goal,1);
  const goal = profile.goal||2000;

  document.getElementById('week-chart').innerHTML = week.map((d,i)=>`
    <div class="bar-wrap">
      <div class="bar ${i===6?'today':''}" style="height:${Math.round(d.cal/maxCal*75)}px"></div>
      <div class="bar-lbl">${d.day}</div>
    </div>
  `).join('');

  const active = cals.filter(c=>c>0);
  const avg = active.length ? Math.round(active.reduce((a,b)=>a+b,0)/active.length) : 0;
  const daysOk = cals.filter(c=>c>0&&c<=goal).length;
  const total = cals.reduce((a,b)=>a+b,0);

  document.getElementById('stat-grid').innerHTML = [
    {v:avg+' ккал',l:'Среднее/день'},
    {v:daysOk+' из 7',l:'Дней в норме'},
    {v:total+' ккал',l:'Всего за неделю'},
    {v:(goal-avg>=0?'-':'+')+Math.abs(goal-avg)+' ккал',l:'Баланс/день'},
  ].map(s=>`<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

  document.getElementById('avg-macros').innerHTML = [
    {n:'Белки',v:Math.round(avg*0.3/4),g:profile.protein_goal||150,c:'var(--green)'},
    {n:'Углеводы',v:Math.round(avg*0.5/4),g:profile.carbs_goal||250,c:'var(--orange)'},
    {n:'Жиры',v:Math.round(avg*0.2/9),g:profile.fat_goal||70,c:'var(--blue)'},
  ].map(m=>`
    <div class="macro-stat">
      <div class="macro-stat-dot" style="background:${m.c}"></div>
      <div class="macro-stat-name">${m.n}</div>
      <div class="macro-stat-bar"><div class="macro-stat-fill" style="width:${Math.min(m.v/m.g*100,100)}%;background:${m.c}"></div></div>
      <div class="macro-stat-val">${m.v}г</div>
    </div>
  `).join('');
}

async function loadProfile() {
  profile = await api('/api/profile');
  const entries = await api('/api/diary');
  const cal = entries.reduce((s,e)=>s+e.cal,0);
  document.getElementById('qs-cal').textContent = Math.round(cal);
  document.getElementById('qs-weight').textContent = profile.weight||'—';
  document.getElementById('s-goal').textContent = (profile.goal||2000)+' ккал';
  document.getElementById('s-body').textContent = profile.weight ? profile.weight+'кг' : '—';
  if (window.Telegram&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user)
    document.getElementById('profile-name-display').textContent = Telegram.WebApp.initDataUnsafe.user.first_name||'Пользователь';
}

function openSheet(type) {
  const sheet = document.getElementById('profile-sheet');
  const title = document.getElementById('sheet-title');
  const content = document.getElementById('sheet-content');
  sheet.classList.add('open');
  if (type==='goals') {
    title.textContent = '🎯 Цели питания';
    content.innerHTML = `
      <div class="field-group"><div class="field-lbl">Норма калорий</div><input class="field-inp" id="f-goal" type="number" inputmode="numeric" value="${profile.goal||2000}"></div>
      <div class="field-group"><div class="field-lbl">Белки (г)</div><input class="field-inp" id="f-protein" type="number" inputmode="numeric" value="${profile.protein_goal||150}"></div>
      <div class="field-group"><div class="field-lbl">Жиры (г)</div><input class="field-inp" id="f-fat" type="number" inputmode="numeric" value="${profile.fat_goal||70}"></div>
      <div class="field-group"><div class="field-lbl">Углеводы (г)</div><input class="field-inp" id="f-carbs" type="number" inputmode="numeric" value="${profile.carbs_goal||250}"></div>
      <button class="green-btn" onclick="saveGoals()">💾 Сохранить</button>
      <button class="ghost-btn" onclick="closeModal('profile-sheet')">Отмена</button>
    `;
  } else if (type==='body') {
    title.textContent = '💪 Параметры тела';
    content.innerHTML = `
      <div class="field-group"><div class="field-lbl">Вес (кг)</div><input class="field-inp" id="f-weight" type="number" inputmode="decimal" value="${profile.weight||''}"></div>
      <div class="field-group"><div class="field-lbl">Рост (см)</div><input class="field-inp" id="f-height" type="number" inputmode="numeric" value="${profile.height||''}"></div>
      <div class="field-group"><div class="field-lbl">Возраст</div><input class="field-inp" id="f-age" type="number" inputmode="numeric" value="${profile.age||''}"></div>
      <button class="green-btn" onclick="saveBody()">💾 Сохранить</button>
      <button class="ghost-btn" onclick="closeModal('profile-sheet')">Отмена</button>
    `;
  } else if (type==='calc') {
    title.textContent = '⚡ Рассчитать норму';
    content.innerHTML = `
      <div class="field-group"><div class="field-lbl">Пол</div>
        <select class="field-inp" id="f-gender" style="color:var(--text)">
          <option value="male">Мужской</option><option value="female">Женский</option>
        </select></div>
      <div class="field-group"><div class="field-lbl">Активность</div>
        <select class="field-inp" id="f-activity" style="color:var(--text)">
          <option value="1.2">Минимальная</option><option value="1.375">Лёгкая</option>
          <option value="1.55" selected>Умеренная</option><option value="1.725">Высокая</option><option value="1.9">Очень высокая</option>
        </select></div>
      <div class="field-group"><div class="field-lbl">Цель</div>
        <select class="field-inp" id="f-goaltype" style="color:var(--text)">
          <option value="-500">Похудение</option><option value="0" selected>Поддержание</option><option value="300">Набор массы</option>
        </select></div>
      <button class="green-btn" onclick="calcBMR()">⚡ Рассчитать</button>
      <button class="ghost-btn" onclick="closeModal('profile-sheet')">Отмена</button>
    `;
  }
}

async function saveGoals() {
  profile.goal=parseInt(document.getElementById('f-goal').value);
  profile.protein_goal=parseInt(document.getElementById('f-protein').value);
  profile.fat_goal=parseInt(document.getElementById('f-fat').value);
  profile.carbs_goal=parseInt(document.getElementById('f-carbs').value);
  await api('/api/profile',{method:'POST',body:JSON.stringify(profile)});
  closeModal('profile-sheet'); loadProfile();
}

async function saveBody() {
  profile.weight=parseFloat(document.getElementById('f-weight').value);
  profile.height=parseFloat(document.getElementById('f-height').value);
  profile.age=parseInt(document.getElementById('f-age').value);
  await api('/api/profile',{method:'POST',body:JSON.stringify(profile)});
  closeModal('profile-sheet'); loadProfile();
}

function calcBMR() {
  const w=profile.weight,h=profile.height,a=profile.age;
  if (!w||!h||!a){alert('Сначала заполните параметры тела');closeModal('profile-sheet');openSheet('body');return;}
  const g=document.getElementById('f-gender').value;
  const act=parseFloat(document.getElementById('f-activity').value);
  const adj=parseInt(document.getElementById('f-goaltype').value);
  const bmr=g==='male'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  profile.goal=Math.round(bmr*act+adj);
  api('/api/profile',{method:'POST',body:JSON.stringify(profile)});
  alert(`Норма: ${profile.goal} ккал/день`);
  closeModal('profile-sheet'); loadProfile();
}

loadDiary();
</script>
</body>
</html>
